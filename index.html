<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vickie & Julien</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Arapey:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="navbar">

    <div class="logo">
      Vickie & Julien
    </div>

    <nav class="nav-links">
      <a href="#">Accueil</a>
      <a href="lieu-et-programme.html">Lieu & Programme</a>
      <a href="infos-pratiques.html">Infos pratiques</a>
      <a href="cagnotte.html">Cagnotte</a>

      <a href="rsvp.html" class="btn small">
        Répondre
      </a>
    </nav>

    <button class="burger">
      ☰
    </button>

  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-overlay">

      <div class="hero-logos">

        <img
          src="images/VICKIE_LOGO_1.png"
          alt="Logo Vickie"
        >

        <span class="heart">♥</span>

        <img
          src="images/JULIEN_LOGO_1.png"
          alt="Logo Julien"
        >

      </div>

      <h1>Vickie & Julien</h1>

      <div class="countdown">
        <div class="countdown-item">
          <span class="countdown-number" id="cd-days">--</span>
          <span class="countdown-label">jours</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-hours">--</span>
          <span class="countdown-label">heures</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-minutes">--</span>
          <span class="countdown-label">minutes</span>
        </div>
        <div class="countdown-sep">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-seconds">--</span>
          <span class="countdown-label">secondes</span>
        </div>
      </div>

      <style>
        .countdown {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          margin-bottom: 40px;
        }
        .countdown-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          min-width: 72px;
        }
        .countdown-number {
          font-family: "Allura", cursive;
          font-size: 64px;
          line-height: 1;
          color: var(--accent);
        }
        .countdown-label {
          font-size: 13px;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--secondary-text);
          margin-top: 4px;
        }
        .countdown-sep {
          font-size: 40px;
          color: var(--accent);
          opacity: 0.4;
          margin-bottom: 20px;
          line-height: 1;
        }
        @media (max-width: 768px) {
          .countdown-number { font-size: 44px; }
          .countdown-item { min-width: 52px; }
          .countdown-sep { font-size: 28px; }
        }
      </style>

      <script>
        (function() {
          const target = new Date('2027-09-04T15:30:00');
          function update() {
            const now = new Date();
            const diff = target - now;
            if (diff <= 0) {
              ['days','hours','minutes','seconds'].forEach(u =>
                document.getElementById('cd-' + u).textContent = '0');
              return;
            }
            const days    = Math.floor(diff / 86400000);
            const hours   = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000)  / 60000);
            const seconds = Math.floor((diff % 60000)    / 1000);
            document.getElementById('cd-days').textContent    = days;
            document.getElementById('cd-hours').textContent   = String(hours).padStart(2, '0');
            document.getElementById('cd-minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('cd-seconds').textContent = String(seconds).padStart(2, '0');
          }
          update();
          setInterval(update, 1000);
        })();
      <script>

      <div class="event-info">

        <div class="info-item">
          <span>📅</span>
          <p>04 Septembre 2027</p>
        </div>

        <div class="info-item">
          <span>📍</span>
          <p>La cour de Bovrel - Saint Guyomard</p>
        </div>

      </div>

      <div class="hero-buttons">

        <a href="lieu-et-programme.html" class="btn">
          Découvrir le lieu & le programme
        </a>

        <a href="infos-pratiques.html" class="btn">
          Infos pratiques pour les invité·es
        </a>

      </div>

      <div class="scroll-down">
        ↓
      </div>

    </div>

  </section>

  <!-- RSVP -->
  <section class="rsvp">

    <div class="container">

      <h2>Vous venez ?</h2>

      <p>
        Nous serions tellement heureux de vous compter parmi nous
        pour cette journée. Prenez quelques instants pour nous répondre —
        cela nous aide énormément dans notre organisation.
      </p>

      <a href="svp.html" class="btn">
        Répondre au faire-part
      </a>

      <small>
        Une question ? N'hésitez pas à nous écrire directement.
      </small>

    </div>

  </section>

</body>
</html>
